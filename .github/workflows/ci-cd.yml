name: Intelligent Investor CI/CD

on:
  push:
    branches: [dev, stage, main]
  pull_request:
    branches: [dev, stage, main]

jobs:
  test:
    name: Test backend and frontend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: investor_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d investor_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: investor_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend unit and integration tests
        working-directory: backend
        run: npm test

      - name: Run frontend component test
        working-directory: frontend
        run: npm test

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t intelligent-investor-backend:ci ./backend

      - name: Validate Docker Compose configuration
        run: docker compose config

  publish-backend-image:
    name: Publish backend image to Docker Hub
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            roivishi/ii-backend:latest
            roivishi/ii-backend:${{ github.sha }}

  e2e:
    name: Run end-to-end smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for E2E
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend E2E dependencies
        working-directory: frontend
        run: npm install

      - name: Start application stack
        run: docker compose up -d --build

      - name: Verify application health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Run Cypress E2E test
        working-directory: frontend
        run: npx cypress run

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/stage'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start staging stack
        run: docker compose up -d --build

      - name: Verify staging health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

  deploy-production-check:
    name: Verify production deployment
    runs-on: ubuntu-latest
    needs: publish-backend-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Verify Render backend health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS https://intelligent-investor-api.onrender.com/health; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Verify Render frontend
        run: curl -fsS https://intelligent-investor-web.onrender.com >/dev/null
