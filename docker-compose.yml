services:
  # ── Service 1: PostgreSQL Database ────────────────────
  db:
    image: postgres:15-alpine # official Postgres image — no Dockerfile needed
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: investor_db
    ports:
      - '5432:5432' # expose for local DB clients (TablePlus, etc.)
    volumes:
      - db_data:/var/lib/postgresql/data # ← THIS is what makes data persist
# ── Service 2: Node.js Backend ─────────────────────────
  backend:
    build: ./backend # build image from backend/Dockerfile
    environment:
      DB_HOST: db # 'db' = the service name above (NOT localhost!)
      DB_PORT: '5432'
      DB_NAME: investor_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: '5000'
    ports:
      - '3001:5000' # your machine:3001 → container:5000
    depends_on:
      - db # starts db container first
  # ── Service 3: Static Frontend (nginx) ─────────────────
  frontend:
    image: nginx:alpine # no Dockerfile — nginx serves files directly
    ports:
      - '8080:80' # your machine:8080 → nginx:80
    volumes:
      - ./frontend:/usr/share/nginx/html:ro # mount frontend folder read-only
    depends_on:
      - backend
# ── Named Volume ───────────────────────────────────────────
volumes:
  db_data: # Docker manages this — data survives restarts