<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligent Investor</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18212f;
      --muted: #617086;
      --line: #d7dde7;
      --surface: #ffffff;
      --page: #f4f7fb;
      --soft: #e9eef6;
      --blue: #2057a5;
      --green: #13795b;
      --amber: #946200;
      --rose: #b4235b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--ink);
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 32px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.05rem;
    }

    p {
      color: var(--muted);
      line-height: 1.55;
      margin: 8px 0 0;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 340px) 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel,
    .bucket,
    .chart-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(20, 35, 60, 0.06);
    }

    .panel {
      padding: 18px;
      position: sticky;
      top: 16px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      height: 40px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      font: inherit;
    }

    button {
      width: 100%;
      height: 40px;
      margin-top: 12px;
      border: 0;
      border-radius: 6px;
      background: var(--blue);
      color: white;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .secondary {
      background: var(--soft);
      color: var(--ink);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .actions button {
      margin-top: 0;
    }

    .error {
      color: #a11616;
      min-height: 22px;
      margin-top: 12px;
      font-weight: 700;
    }

    .buckets {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .bucket {
      padding: 14px;
      min-height: 104px;
      border-top: 4px solid var(--blue);
    }

    .bucket:nth-child(2) {
      border-top-color: var(--green);
    }

    .bucket:nth-child(3) {
      border-top-color: var(--amber);
    }

    .bucket:nth-child(4) {
      border-top-color: var(--rose);
    }

    .bucket strong {
      display: block;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .bucket span {
      display: block;
      margin-top: 10px;
      font-size: clamp(1.2rem, 2vw, 1.55rem);
      font-weight: 900;
      white-space: nowrap;
    }

    .chart-panel {
      padding: 18px;
      height: 390px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .chart-frame {
      width: 100%;
      height: 320px;
      margin-top: 8px;
      overflow: hidden;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .axis-label {
      fill: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 980px) {
      .buckets {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      header,
      .layout {
        display: block;
      }

      .panel {
        margin-bottom: 18px;
        position: static;
      }

      .buckets {
        grid-template-columns: 1fr;
      }

      .chart-panel {
        height: 340px;
      }

      .chart-frame {
        height: 270px;
      }

    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Intelligent Investor</h1>
        <p>Common Sense Spending buckets and a fixed 7% investment projection.</p>
      </div>
      <p id="api-status">Backend: checking...</p>
    </header>

    <div id="root"></div>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
