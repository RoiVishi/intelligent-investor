<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020a23"/>
      <stop offset="50%" stop-color="#04153e"/>
      <stop offset="100%" stop-color="#010814"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d9ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2d7a"/>
      <stop offset="100%" stop-color="#071633"/>
    </linearGradient>
    <linearGradient id="pinkCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#65153e"/>
      <stop offset="100%" stop-color="#251029"/>
    </linearGradient>
    <linearGradient id="tealCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4e5b"/>
      <stop offset="100%" stop-color="#082933"/>
    </linearGradient>
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 z" fill="#39e7ff"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.35" stroke="url(#lineGlow)" stroke-width="2">
    <line x1="0" y1="65" x2="1600" y2="65"/>
    <line x1="0" y1="170" x2="1600" y2="170"/>
    <line x1="0" y1="260" x2="1600" y2="260"/>
    <line x1="0" y1="835" x2="1600" y2="835"/>
  </g>

  <text x="800" y="86" font-size="60" font-weight="700" fill="#bdeaff" text-anchor="middle" filter="url(#neon)">Intelligent Investor – Render Production Cloud</text>
  <text x="800" y="130" font-size="24" fill="#8ad9ff" text-anchor="middle">Blueprint: render.yaml · Static Site + Docker Web Service + Managed PostgreSQL</text>

  <rect x="120" y="260" width="1360" height="540" rx="34" fill="none" stroke="#2fdcff" stroke-width="3" opacity="0.9" filter="url(#neon)"/>
  <text x="800" y="305" font-size="26" fill="#aaf0ff" text-anchor="middle" font-weight="600">Render Cloud Boundary</text>

  <rect x="60" y="500" width="130" height="82" rx="10" fill="#0b1733" stroke="#39e7ff" stroke-width="3" filter="url(#neon)"/>
  <text x="125" y="551" text-anchor="middle" font-size="42" fill="#8de9ff">👤</text>
  <text x="125" y="610" text-anchor="middle" font-size="42" fill="#8de9ff" filter="url(#soft)">⮕</text>
  <rect x="36" y="620" width="180" height="64" rx="10" fill="#0d1d41" stroke="#39e7ff" stroke-width="2"/>
  <text x="126" y="662" text-anchor="middle" font-size="42" fill="#d7f7ff" font-weight="600">App Access</text>

  <g>
    <rect x="220" y="360" width="380" height="360" rx="22" fill="url(#blueCard)" stroke="#3bb3ff" stroke-width="4" filter="url(#neon)"/>
    <rect x="220" y="360" width="380" height="95" rx="22" fill="none" stroke="#3bb3ff" stroke-width="4"/>
    <text x="410" y="410" text-anchor="middle" fill="#b8e8ff" font-size="46" font-weight="700">Presentation Layer</text>
    <text x="410" y="447" text-anchor="middle" fill="#8dd5ff" font-size="35">Render Static Site</text>
    <text x="275" y="520" fill="#bce9ff" font-size="54">⚛</text>
    <text x="330" y="520" fill="#d8f5ff" font-size="46" font-weight="700">React + Vite</text>
    <text x="330" y="565" fill="#9fdcff" font-size="36">intelligent-investor-web.onrender.com</text>
    <text x="255" y="620" fill="#8eeaff" font-size="30">▪ Interactive UI &amp; Charts</text>
    <text x="255" y="665" fill="#8eeaff" font-size="30">▪ Injects API URL via dist/config.js</text>
  </g>

  <g>
    <rect x="650" y="360" width="430" height="360" rx="22" fill="url(#pinkCard)" stroke="#ff5f8a" stroke-width="4" filter="url(#neon)"/>
    <rect x="650" y="360" width="430" height="95" rx="22" fill="none" stroke="#ff5f8a" stroke-width="4"/>
    <text x="865" y="410" text-anchor="middle" fill="#ffd2e0" font-size="46" font-weight="700">Application Layer</text>
    <text x="865" y="447" text-anchor="middle" fill="#ff9bb7" font-size="35">Render Web Service (Docker)</text>
    <text x="710" y="520" fill="#ffc7d8" font-size="54">🛠</text>
    <text x="765" y="520" fill="#ffe5ee" font-size="46" font-weight="700">Node.js / Express API</text>
    <text x="765" y="565" fill="#ffc2d7" font-size="35">intelligent-investor-api.onrender.com</text>
    <text x="675" y="620" fill="#ffb7ce" font-size="30">▪ healthCheckPath: /health</text>
    <text x="675" y="665" fill="#ffb7ce" font-size="30">▪ Backend reads DB env vars from managed DB</text>
  </g>

  <g>
    <rect x="1130" y="360" width="380" height="360" rx="22" fill="url(#tealCard)" stroke="#40f4c5" stroke-width="4" filter="url(#neon)"/>
    <rect x="1130" y="360" width="380" height="95" rx="22" fill="none" stroke="#40f4c5" stroke-width="4"/>
    <text x="1320" y="410" text-anchor="middle" fill="#cbfff2" font-size="44" font-weight="700">Data Persistence Layer</text>
    <text x="1320" y="447" text-anchor="middle" fill="#99fbe0" font-size="35">Managed PostgreSQL</text>
    <text x="1180" y="520" fill="#dbfff4" font-size="54">🐘</text>
    <text x="1238" y="520" fill="#eafff9" font-size="46" font-weight="700">PostgreSQL 16</text>
    <text x="1238" y="565" fill="#b8ffe9" font-size="35">intelligent-investor-db</text>
    <text x="1160" y="620" fill="#8effda" font-size="30">▪ investor_db · investor_user · free plan</text>
    <text x="1160" y="665" fill="#8effda" font-size="30">▪ Persistent financial profile storage</text>
  </g>

  <line x1="600" y1="540" x2="640" y2="540" stroke="#39e7ff" stroke-width="8" marker-end="url(#arrowBlue)" filter="url(#neon)"/>
  <text x="620" y="512" text-anchor="middle" fill="#79f0ff" font-size="26" font-weight="700">REST API Requests</text>

  <line x1="1080" y1="540" x2="1120" y2="540" stroke="#39e7ff" stroke-width="8" marker-end="url(#arrowBlue)" filter="url(#neon)"/>
  <text x="1100" y="512" text-anchor="middle" fill="#79f0ff" font-size="26" font-weight="700">PostgreSQL Queries</text>

  <text x="800" y="790" text-anchor="middle" fill="#8fdfff" font-size="23">Public traffic reaches the static frontend, which calls the Dockerized backend API over HTTPS; the API persists data in Render PostgreSQL.</text>
</svg>
