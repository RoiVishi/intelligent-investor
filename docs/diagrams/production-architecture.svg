<svg width="1400" height="700" viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="aSky" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#0284c7"/></marker>
    <marker id="aAmber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#d97706"/></marker>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="1.2" cy="1.2" r="1.2" fill="#e2e8f0"/></pattern>
  </defs>

  <rect width="1400" height="700" fill="#ffffff"/>
  <rect width="1400" height="700" fill="url(#dots)"/>

  <!-- Title -->
  <rect x="60" y="28" width="6" height="48" rx="3" fill="#0284c7"/>
  <text x="80" y="52" font-size="26" font-weight="700" fill="#1e293b">Production — Render Cloud</text>
  <text x="80" y="80" font-size="15" fill="#64748b">Provisioned from Blueprint render.yaml — Static Site, Dockerized Web Service and a managed PostgreSQL database</text>

  <!-- User browser -->
  <rect x="60" y="250" width="180" height="110" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="150" y="282" font-size="10.5" letter-spacing="2" fill="#64748b" text-anchor="middle">USER</text>
  <text x="150" y="310" font-size="17" font-weight="700" fill="#1e293b" text-anchor="middle">Web Browser</text>
  <text x="150" y="334" font-size="11.5" fill="#64748b" text-anchor="middle">onrender.com</text>

  <!-- Render boundary -->
  <rect x="300" y="160" width="1040" height="400" rx="14" fill="#f8fafc" fill-opacity="0.65" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8 6"/>
  <rect x="324" y="146" width="330" height="28" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="489" y="165" font-size="13" fill="#334155" text-anchor="middle">Render Cloud — Blueprint: render.yaml</text>

  <!-- Static site -->
  <rect x="340" y="230" width="260" height="200" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <text x="360" y="258" font-size="10.5" letter-spacing="2" fill="#0284c7">STATIC SITE</text>
  <text x="360" y="282" font-size="15.5" font-weight="700" fill="#1e293b">intelligent-investor-web</text>
  <line x1="360" y1="296" x2="580" y2="296" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="360" y="318" font-size="12" fill="#334155">npm install &amp;&amp; npm run build</text>
  <text x="360" y="338" font-size="12" fill="#475569">config.js generated at build time</text>
  <text x="360" y="356" font-size="12" fill="#475569">injects window.API_BASE_URL</text>
  <rect x="360" y="384" width="150" height="26" rx="13" fill="#fff7ed" stroke="#d97706" stroke-width="1.2"/>
  <text x="435" y="401" font-size="12" fill="#92400e" text-anchor="middle">publishes dist/</text>

  <!-- API web service -->
  <rect x="680" y="205" width="290" height="250" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <text x="700" y="233" font-size="10.5" letter-spacing="1.5" fill="#0284c7">WEB SERVICE · DOCKER RUNTIME</text>
  <text x="700" y="257" font-size="15.5" font-weight="700" fill="#1e293b">intelligent-investor-api</text>
  <line x1="700" y1="271" x2="950" y2="271" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="700" y="293" font-size="12.5" fill="#334155">Built from backend/Dockerfile</text>
  <text x="700" y="313" font-size="12.5" fill="#334155">Node.js + Express REST API</text>
  <text x="700" y="333" font-size="12.5" fill="#475569">healthCheckPath: /health</text>
  <text x="700" y="353" font-size="12.5" fill="#475569">DB env vars injected fromDatabase</text>
  <text x="700" y="371" font-size="11.5" fill="#64748b">(host · port · name · user · password)</text>
  <rect x="700" y="396" width="120" height="26" rx="13" fill="#fff7ed" stroke="#d97706" stroke-width="1.2"/>
  <text x="760" y="413" font-size="12" fill="#92400e" text-anchor="middle">PORT 5000</text>

  <!-- Managed database -->
  <rect x="1050" y="230" width="260" height="200" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <text x="1070" y="258" font-size="10.5" letter-spacing="2" fill="#0284c7">MANAGED DATABASE</text>
  <text x="1070" y="282" font-size="15.5" font-weight="700" fill="#1e293b">intelligent-investor-db</text>
  <line x1="1070" y1="296" x2="1290" y2="296" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="1070" y="318" font-size="12.5" fill="#334155">Render managed PostgreSQL</text>
  <text x="1070" y="338" font-size="12.5" fill="#475569">database: investor_db</text>
  <text x="1070" y="356" font-size="12.5" fill="#475569">user: investor_user</text>
  <rect x="1070" y="384" width="110" height="26" rx="13" fill="#fff7ed" stroke="#d97706" stroke-width="1.2"/>
  <text x="1125" y="401" font-size="12" fill="#92400e" text-anchor="middle">plan: free</text>

  <!-- Arrows -->
  <line x1="240" y1="305" x2="332" y2="305" stroke="#0284c7" stroke-width="2" marker-end="url(#aSky)"/>
  <rect x="262" y="280" width="52" height="16" fill="#ffffff"/>
  <text x="288" y="292" font-size="11.5" fill="#0c4a6e" text-anchor="middle">HTTPS</text>

  <line x1="600" y1="305" x2="672" y2="305" stroke="#0284c7" stroke-width="2" marker-end="url(#aSky)"/>
  <text x="638" y="292" font-size="11.5" fill="#0c4a6e" text-anchor="middle">HTTPS</text>
  <text x="638" y="326" font-size="11.5" fill="#0c4a6e" text-anchor="middle">REST</text>

  <line x1="970" y1="305" x2="1042" y2="305" stroke="#0284c7" stroke-width="2" marker-end="url(#aSky)"/>
  <text x="1006" y="292" font-size="11.5" fill="#0c4a6e" text-anchor="middle">secure</text>
  <text x="1006" y="326" font-size="11.5" fill="#0c4a6e" text-anchor="middle">connection</text>

  <!-- Docker Hub connector + note -->
  <line x1="825" y1="455" x2="825" y2="581" stroke="#d97706" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#aAmber)"/>
  <text x="838" y="540" font-size="11" fill="#b45309">same backend/Dockerfile</text>

  <rect x="640" y="585" width="460" height="80" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
  <text x="664" y="610" font-size="10.5" letter-spacing="2" fill="#b45309">DOCKER HUB · CI PUBLISH</text>
  <text x="664" y="632" font-size="12.5" fill="#334155">On every merge to main, CI pushes the backend image:</text>
  <text x="664" y="651" font-size="12.5" font-weight="700" fill="#92400e">roivishi/ii-backend:latest  ·  :&lt;commit-SHA&gt;</text>

  <!-- Free tier note -->
  <rect x="60" y="585" width="520" height="80" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="84" y="610" font-size="10.5" letter-spacing="2" fill="#64748b">FREE TIER</text>
  <text x="84" y="632" font-size="12.5" fill="#334155">Services spin down after a period of inactivity —</text>
  <text x="84" y="651" font-size="12.5" fill="#334155">the first request after idle takes ~50 s (cold start).</text>
</svg>
