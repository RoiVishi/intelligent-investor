<svg width="1400" height="880" viewBox="0 0 1400 880" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="aSky" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#0284c7"/></marker>
    <marker id="aSlate" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#475569"/></marker>
    <marker id="aAmber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#d97706"/></marker>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="1.2" cy="1.2" r="1.2" fill="#e2e8f0"/></pattern>
  </defs>

  <rect width="1400" height="880" fill="#ffffff"/>
  <rect width="1400" height="880" fill="url(#dots)"/>

  <!-- Title -->
  <rect x="60" y="28" width="6" height="48" rx="3" fill="#0284c7"/>
  <text x="80" y="52" font-size="26" font-weight="700" fill="#1e293b">CI/CD — GitHub Actions + Git Flow</text>
  <text x="80" y="80" font-size="15" fill="#64748b">Workflow ci-cd.yml runs on every push and pull request to dev, stage and main — six jobs gate the path to production</text>

  <!-- Git Flow band -->
  <rect x="60" y="115" width="1280" height="175" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="84" y="146" font-size="11" letter-spacing="2" fill="#64748b">GIT FLOW</text>

  <rect x="100" y="175" width="190" height="64" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="195" y="203" font-size="16" font-weight="700" fill="#334155" text-anchor="middle">feature/*</text>
  <text x="195" y="224" font-size="10.5" fill="#64748b" text-anchor="middle">short-lived branches</text>

  <rect x="430" y="175" width="180" height="64" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <text x="520" y="203" font-size="16" font-weight="700" fill="#0c4a6e" text-anchor="middle">dev</text>
  <text x="520" y="224" font-size="10.5" fill="#64748b" text-anchor="middle">integration</text>

  <rect x="750" y="175" width="180" height="64" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <text x="840" y="203" font-size="16" font-weight="700" fill="#0c4a6e" text-anchor="middle">stage</text>
  <text x="840" y="224" font-size="10.5" fill="#64748b" text-anchor="middle">pre-production</text>

  <rect x="1070" y="175" width="200" height="64" rx="10" fill="#f0f9ff" stroke="#0284c7" stroke-width="2.5"/>
  <text x="1170" y="203" font-size="16" font-weight="700" fill="#0c4a6e" text-anchor="middle">main</text>
  <text x="1170" y="224" font-size="10.5" font-weight="600" fill="#b45309" text-anchor="middle">production</text>

  <line x1="290" y1="207" x2="424" y2="207" stroke="#0284c7" stroke-width="2" marker-end="url(#aSky)"/>
  <text x="357" y="192" font-size="11.5" fill="#475569" text-anchor="middle">pull request</text>
  <text x="357" y="229" font-size="11.5" fill="#475569" text-anchor="middle">code review</text>

  <line x1="610" y1="207" x2="744" y2="207" stroke="#0284c7" stroke-width="2" marker-end="url(#aSky)"/>
  <text x="677" y="192" font-size="11.5" fill="#475569" text-anchor="middle">pull request</text>
  <text x="677" y="229" font-size="11.5" fill="#475569" text-anchor="middle">code review</text>

  <line x1="930" y1="207" x2="1064" y2="207" stroke="#0284c7" stroke-width="2" marker-end="url(#aSky)"/>
  <text x="997" y="192" font-size="11.5" fill="#475569" text-anchor="middle">pull request</text>
  <text x="997" y="229" font-size="11.5" fill="#475569" text-anchor="middle">code review</text>

  <!-- Trigger -->
  <line x1="700" y1="290" x2="700" y2="344" stroke="#475569" stroke-width="2" marker-end="url(#aSlate)"/>
  <text x="715" y="322" font-size="12.5" fill="#475569">every push / pull request to dev · stage · main triggers the pipeline</text>

  <!-- Pipeline boundary -->
  <rect x="60" y="350" width="1280" height="440" rx="14" fill="#f8fafc" fill-opacity="0.55" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8 6"/>
  <rect x="84" y="336" width="250" height="28" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="209" y="355" font-size="13" fill="#334155" text-anchor="middle">GitHub Actions — ci-cd.yml</text>

  <!-- Job 1 -->
  <rect x="100" y="410" width="360" height="150" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <circle cx="130" cy="442" r="15" fill="#0284c7"/>
  <text x="130" y="447" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="156" y="447" font-size="15" font-weight="700" fill="#1e293b">Test backend and frontend</text>
  <text x="156" y="466" font-size="11" font-style="italic" fill="#0284c7">on every push / PR to dev · stage · main</text>
  <line x1="124" y1="478" x2="436" y2="478" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="124" y="502" font-size="12.5" fill="#475569">· Jest unit + integration tests (backend)</text>
  <text x="124" y="524" font-size="12.5" fill="#475569">· PostgreSQL 15 service container</text>
  <text x="124" y="546" font-size="12.5" fill="#475569">· Vitest component tests (frontend)</text>

  <!-- Job 2 -->
  <rect x="540" y="410" width="340" height="150" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <circle cx="570" cy="442" r="15" fill="#0284c7"/>
  <text x="570" y="447" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="596" y="447" font-size="15" font-weight="700" fill="#1e293b">Build Docker images</text>
  <text x="596" y="466" font-size="11" font-style="italic" fill="#0284c7">needs: test</text>
  <line x1="564" y1="478" x2="856" y2="478" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="564" y="502" font-size="12.5" fill="#475569">· docker build ./backend</text>
  <text x="564" y="524" font-size="12.5" fill="#475569">· docker compose config — validate stack</text>

  <!-- Job 3 -->
  <rect x="960" y="410" width="360" height="150" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <circle cx="990" cy="442" r="15" fill="#0284c7"/>
  <text x="990" y="447" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="1016" y="447" font-size="15" font-weight="700" fill="#1e293b">Run end-to-end smoke test</text>
  <text x="1016" y="466" font-size="11" font-style="italic" fill="#0284c7">needs: build</text>
  <line x1="984" y1="478" x2="1296" y2="478" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="984" y="502" font-size="12.5" fill="#475569">· docker compose up -d --build (full stack)</text>
  <text x="984" y="524" font-size="12.5" fill="#475569">· wait until GET /health returns 200</text>
  <text x="984" y="546" font-size="12.5" fill="#475569">· Cypress E2E against the running app</text>

  <!-- Row 1 arrows -->
  <line x1="460" y1="485" x2="534" y2="485" stroke="#0284c7" stroke-width="2" marker-end="url(#aSky)"/>
  <text x="497" y="472" font-size="11" fill="#0c4a6e" text-anchor="middle">needs</text>
  <line x1="880" y1="485" x2="954" y2="485" stroke="#0284c7" stroke-width="2" marker-end="url(#aSky)"/>
  <text x="917" y="472" font-size="11" fill="#0c4a6e" text-anchor="middle">needs</text>

  <!-- Branch arrows to row 2 -->
  <polyline points="1060,560 1060,590 280,590 280,624" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#aAmber)"/>
  <text x="640" y="583" font-size="11" fill="#b45309" text-anchor="middle">only on stage branch</text>

  <polyline points="1180,560 1180,612 720,612 720,624" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#aAmber)"/>
  <text x="960" y="606" font-size="11" fill="#b45309" text-anchor="middle">only on push to main</text>

  <!-- Job 4 -->
  <rect x="100" y="630" width="360" height="140" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <circle cx="130" cy="662" r="15" fill="#0284c7"/>
  <text x="130" y="667" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  <text x="156" y="667" font-size="15" font-weight="700" fill="#1e293b">Deploy to staging</text>
  <text x="156" y="686" font-size="11" font-style="italic" fill="#b45309">needs: e2e — only on stage branch</text>
  <line x1="124" y1="698" x2="436" y2="698" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="124" y="722" font-size="12.5" fill="#475569">· docker compose up -d --build (staging stack)</text>
  <text x="124" y="744" font-size="12.5" fill="#475569">· verify GET /health returns 200</text>

  <!-- Job 5 -->
  <rect x="540" y="630" width="360" height="140" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <circle cx="570" cy="662" r="15" fill="#0284c7"/>
  <text x="570" y="667" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
  <text x="596" y="667" font-size="14.5" font-weight="700" fill="#1e293b">Publish backend image to Docker Hub</text>
  <text x="596" y="686" font-size="11" font-style="italic" fill="#b45309">needs: e2e — only on push to main</text>
  <line x1="564" y1="698" x2="876" y2="698" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="564" y="722" font-size="12.5" fill="#475569">· tags: latest + commit SHA</text>
  <text x="564" y="744" font-size="12.5" fill="#475569">· secrets: DOCKERHUB_USERNAME / TOKEN</text>

  <!-- Job 6 -->
  <rect x="980" y="630" width="340" height="140" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <circle cx="1010" cy="662" r="15" fill="#0284c7"/>
  <text x="1010" y="667" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
  <text x="1036" y="667" font-size="14.5" font-weight="700" fill="#1e293b">Verify production deployment</text>
  <text x="1036" y="686" font-size="11" font-style="italic" fill="#b45309">needs: publish — only on main</text>
  <line x1="1004" y1="698" x2="1296" y2="698" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="1004" y="722" font-size="12.5" fill="#475569">· polls Render API /health endpoint</text>
  <text x="1004" y="744" font-size="12.5" fill="#475569">· checks the frontend URL responds</text>

  <!-- Job 5 -> 6 -->
  <line x1="900" y1="700" x2="974" y2="700" stroke="#0284c7" stroke-width="2" marker-end="url(#aSky)"/>
  <text x="937" y="687" font-size="11" fill="#0c4a6e" text-anchor="middle">needs</text>

  <!-- Failure note -->
  <rect x="100" y="810" width="880" height="50" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
  <circle cx="128" cy="835" r="13" fill="#d97706"/>
  <line x1="123" y1="830" x2="133" y2="840" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="133" y1="830" x2="123" y2="840" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <text x="154" y="830" font-size="13" font-weight="700" fill="#92400e">Failing job = blocked chain</text>
  <text x="154" y="848" font-size="12" fill="#475569">If any job fails, downstream jobs are skipped and branch protection blocks the merge and the deployment.</text>
</svg>
