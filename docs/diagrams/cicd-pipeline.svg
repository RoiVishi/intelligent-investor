<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020a23"/>
      <stop offset="55%" stop-color="#04153e"/>
      <stop offset="100%" stop-color="#010814"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d9ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 z" fill="#39e7ff"/>
    </marker>
    <marker id="amber" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 z" fill="#ffc266"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <g opacity="0.35" stroke="url(#cyan)" stroke-width="2">
    <line x1="0" y1="70" x2="1600" y2="70"/>
    <line x1="0" y1="185" x2="1600" y2="185"/>
    <line x1="0" y1="290" x2="1600" y2="290"/>
    <line x1="0" y1="920" x2="1600" y2="920"/>
  </g>

  <text x="800" y="86" text-anchor="middle" font-size="58" font-weight="700" fill="#bdeaff" filter="url(#neon)">Intelligent Investor – Render Deployment Pipeline</text>
  <text x="800" y="132" text-anchor="middle" font-size="24" fill="#8ad9ff">GitHub Actions workflow: .github/workflows/ci-cd.yml</text>

  <rect x="90" y="210" width="1420" height="140" rx="22" fill="none" stroke="#3adfff" stroke-width="3" filter="url(#neon)"/>
  <text x="800" y="250" text-anchor="middle" font-size="28" fill="#c9f6ff" font-weight="700">Git Flow Promotion</text>

  <g font-size="34" font-weight="700" text-anchor="middle">
    <rect x="140" y="268" width="250" height="56" rx="12" fill="#0e2148" stroke="#39e7ff" stroke-width="3"/>
    <text x="265" y="307" fill="#c9f6ff">feature/*</text>

    <rect x="460" y="268" width="170" height="56" rx="12" fill="#0e2148" stroke="#39e7ff" stroke-width="3"/>
    <text x="545" y="307" fill="#c9f6ff">dev</text>

    <rect x="700" y="268" width="190" height="56" rx="12" fill="#0e2148" stroke="#39e7ff" stroke-width="3"/>
    <text x="795" y="307" fill="#c9f6ff">stage</text>

    <rect x="960" y="268" width="190" height="56" rx="12" fill="#0e2148" stroke="#39e7ff" stroke-width="3"/>
    <text x="1055" y="307" fill="#c9f6ff">main</text>

    <rect x="1220" y="268" width="240" height="56" rx="12" fill="#223423" stroke="#7eff7a" stroke-width="3"/>
    <text x="1340" y="307" fill="#d8ffd7">Render Cloud</text>
  </g>

  <g stroke="#39e7ff" stroke-width="5" marker-end="url(#arrow)" filter="url(#neon)">
    <line x1="390" y1="296" x2="450" y2="296"/>
    <line x1="630" y1="296" x2="690" y2="296"/>
    <line x1="890" y1="296" x2="950" y2="296"/>
    <line x1="1150" y1="296" x2="1210" y2="296"/>
  </g>

  <rect x="90" y="380" width="1420" height="470" rx="28" fill="none" stroke="#3adfff" stroke-width="3" filter="url(#neon)"/>
  <text x="800" y="422" text-anchor="middle" font-size="30" fill="#c9f6ff" font-weight="700">Pipeline Jobs (Each stage depends on the previous stage)</text>

  <g>
    <rect x="140" y="470" width="360" height="130" rx="16" fill="#0e2148" stroke="#3adfff" stroke-width="3"/>
    <text x="165" y="512" fill="#8eeaff" font-size="34" font-weight="700">1. Test backend and frontend</text>
    <text x="165" y="555" fill="#ccefff" font-size="27">Jest + Vitest</text>
    <text x="165" y="588" fill="#8fdfff" font-size="25">Triggers on push/PR to dev, stage, main</text>

    <rect x="550" y="470" width="320" height="130" rx="16" fill="#0e2148" stroke="#3adfff" stroke-width="3"/>
    <text x="575" y="512" fill="#8eeaff" font-size="34" font-weight="700">2. Build Docker images</text>
    <text x="575" y="555" fill="#ccefff" font-size="27">docker build + compose config</text>
    <text x="575" y="588" fill="#8fdfff" font-size="25">needs: test</text>

    <rect x="920" y="470" width="540" height="130" rx="16" fill="#0e2148" stroke="#3adfff" stroke-width="3"/>
    <text x="945" y="512" fill="#8eeaff" font-size="34" font-weight="700">3. Run end-to-end smoke test</text>
    <text x="945" y="555" fill="#ccefff" font-size="27">docker compose up + Cypress</text>
    <text x="945" y="588" fill="#8fdfff" font-size="25">needs: build</text>
  </g>

  <g stroke="#39e7ff" stroke-width="5" marker-end="url(#arrow)" filter="url(#neon)">
    <line x1="500" y1="535" x2="540" y2="535"/>
    <line x1="870" y1="535" x2="910" y2="535"/>
  </g>

  <g>
    <rect x="140" y="650" width="390" height="150" rx="16" fill="#17331e" stroke="#7eff7a" stroke-width="3"/>
    <text x="165" y="693" fill="#c6ffd8" font-size="34" font-weight="700">4. Deploy to staging</text>
    <text x="165" y="736" fill="#defee8" font-size="27">docker compose up -d --build</text>
    <text x="165" y="770" fill="#b8ffc9" font-size="25">only when branch == stage</text>

    <rect x="590" y="650" width="430" height="150" rx="16" fill="#3a2a12" stroke="#ffc266" stroke-width="3"/>
    <text x="615" y="693" fill="#ffe2b8" font-size="34" font-weight="700">5. Publish backend image</text>
    <text x="615" y="736" fill="#fff0d7" font-size="27">roivishi/ii-backend:latest + sha</text>
    <text x="615" y="770" fill="#ffe0ad" font-size="25">only push to main</text>

    <rect x="1070" y="650" width="390" height="150" rx="16" fill="#3a2a12" stroke="#ffc266" stroke-width="3"/>
    <text x="1095" y="693" fill="#ffe2b8" font-size="34" font-weight="700">6. Verify production</text>
    <text x="1095" y="736" fill="#fff0d7" font-size="27">Checks Render frontend + /health</text>
    <text x="1095" y="770" fill="#ffe0ad" font-size="25">only push to main, needs publish</text>
  </g>

  <g stroke="#ffc266" stroke-width="5" marker-end="url(#amber)" filter="url(#neon)">
    <polyline points="1120,600 1120,625 335,625 335,640" fill="none"/>
    <polyline points="1220,600 1220,625 805,625 805,640" fill="none"/>
    <line x1="1020" y1="725" x2="1060" y2="725"/>
  </g>

  <text x="800" y="900" text-anchor="middle" fill="#9addff" font-size="25">Any failed job blocks downstream jobs and prevents deployment promotion.</text>
</svg>
