<svg width="1400" height="660" viewBox="0 0 1400 660" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="aSky" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#0284c7"/></marker>
    <marker id="aAmber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#d97706"/></marker>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="1.2" cy="1.2" r="1.2" fill="#e2e8f0"/></pattern>
  </defs>

  <rect width="1400" height="660" fill="#ffffff"/>
  <rect width="1400" height="660" fill="url(#dots)"/>

  <!-- Title -->
  <rect x="60" y="28" width="6" height="48" rx="3" fill="#0284c7"/>
  <text x="80" y="52" font-size="26" font-weight="700" fill="#1e293b">Local Development — Docker Compose</text>
  <text x="80" y="80" font-size="15" fill="#64748b">Three services defined in docker-compose.yml — React/Nginx frontend, Express API and PostgreSQL with a persistent named volume</text>

  <!-- User browser -->
  <rect x="60" y="230" width="180" height="110" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="150" y="262" font-size="10.5" letter-spacing="2" fill="#64748b" text-anchor="middle">USER</text>
  <text x="150" y="290" font-size="17" font-weight="700" fill="#1e293b" text-anchor="middle">Web Browser</text>
  <text x="150" y="314" font-size="11.5" fill="#64748b" text-anchor="middle">localhost:8080</text>

  <!-- Compose boundary -->
  <rect x="300" y="140" width="1040" height="400" rx="14" fill="#f8fafc" fill-opacity="0.65" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8 6"/>
  <rect x="324" y="126" width="266" height="28" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="457" y="145" font-size="13" fill="#334155" text-anchor="middle">docker compose up -d --build</text>

  <!-- Frontend container -->
  <rect x="340" y="210" width="260" height="190" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <text x="360" y="238" font-size="10.5" letter-spacing="2" fill="#0284c7">CONTAINER</text>
  <text x="360" y="264" font-size="18" font-weight="700" fill="#1e293b">Frontend</text>
  <line x1="360" y1="278" x2="580" y2="278" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="360" y="302" font-size="13" fill="#334155">React + Vite production build</text>
  <text x="360" y="322" font-size="13" fill="#334155">Static bundle served by Nginx</text>
  <rect x="360" y="352" width="170" height="28" rx="14" fill="#fff7ed" stroke="#d97706" stroke-width="1.2"/>
  <text x="445" y="370" font-size="12.5" fill="#92400e" text-anchor="middle">port 8080 → 80</text>

  <!-- Backend container -->
  <rect x="680" y="185" width="290" height="240" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <text x="700" y="213" font-size="10.5" letter-spacing="2" fill="#0284c7">CONTAINER</text>
  <text x="700" y="239" font-size="18" font-weight="700" fill="#1e293b">Backend API</text>
  <line x1="700" y1="253" x2="950" y2="253" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="700" y="276" font-size="13" fill="#334155">Node.js + Express REST API</text>
  <text x="700" y="296" font-size="12.5" fill="#475569">Isolated calc module: calculator.js</text>
  <text x="700" y="318" font-size="12.5" fill="#475569">• /calculate</text>
  <text x="700" y="336" font-size="12.5" fill="#475569">• /calculate/profiles</text>
  <text x="700" y="354" font-size="12.5" fill="#475569">• /health — 200 only when DB is up</text>
  <rect x="700" y="376" width="190" height="28" rx="14" fill="#fff7ed" stroke="#d97706" stroke-width="1.2"/>
  <text x="795" y="394" font-size="12.5" fill="#92400e" text-anchor="middle">port 3001 → 5000</text>

  <!-- Database container -->
  <rect x="1050" y="210" width="260" height="190" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.8"/>
  <text x="1070" y="238" font-size="10.5" letter-spacing="2" fill="#0284c7">CONTAINER</text>
  <text x="1070" y="264" font-size="18" font-weight="700" fill="#1e293b">Database</text>
  <line x1="1070" y1="278" x2="1290" y2="278" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="1070" y="300" font-size="13" fill="#334155">PostgreSQL 15-alpine</text>
  <text x="1070" y="322" font-size="12.5" fill="#475569">Tables: financial_profiles,</text>
  <text x="1070" y="338" font-size="12.5" fill="#475569">spending_plans</text>
  <text x="1070" y="362" font-size="12.5" fill="#475569">Schema: backend/db/init.sql</text>

  <!-- Arrows -->
  <line x1="240" y1="285" x2="332" y2="285" stroke="#0284c7" stroke-width="2" marker-end="url(#aSky)"/>
  <rect x="246" y="262" width="84" height="16" fill="#ffffff"/>
  <text x="288" y="274" font-size="11.5" fill="#0c4a6e" text-anchor="middle">HTTP :8080</text>

  <line x1="600" y1="285" x2="672" y2="285" stroke="#0284c7" stroke-width="2" marker-end="url(#aSky)"/>
  <text x="638" y="272" font-size="11.5" fill="#0c4a6e" text-anchor="middle">HTTP / fetch</text>

  <line x1="970" y1="285" x2="1042" y2="285" stroke="#0284c7" stroke-width="2" marker-end="url(#aSky)"/>
  <text x="1006" y="272" font-size="11.5" fill="#0c4a6e" text-anchor="middle">pg driver</text>
  <text x="1006" y="302" font-size="11.5" fill="#0c4a6e" text-anchor="middle">:5432</text>

  <!-- Volume -->
  <line x1="1180" y1="400" x2="1180" y2="431" stroke="#d97706" stroke-width="2" marker-end="url(#aAmber)"/>
  <text x="1192" y="421" font-size="11" fill="#b45309">persists to</text>
  <path d="M1075,447 a105,11 0 0 1 210,0 v52 a105,11 0 0 1 -210,0 z" fill="#fffbeb" stroke="#d97706" stroke-width="1.6"/>
  <ellipse cx="1180" cy="447" rx="105" ry="11" fill="#fef3c7" stroke="#d97706" stroke-width="1.6"/>
  <text x="1180" y="484" font-size="12.5" font-weight="700" fill="#92400e" text-anchor="middle">investor_postgres_data</text>
  <text x="1180" y="501" font-size="10.5" fill="#b45309" text-anchor="middle">named Docker volume</text>

  <!-- Configuration note -->
  <rect x="60" y="575" width="1280" height="50" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
  <text x="84" y="594" font-size="10.5" letter-spacing="2" fill="#b45309">CONFIGURATION</text>
  <text x="84" y="614" font-size="13" fill="#334155">Environment variables flow from .env / compose defaults:  DB_HOST · DB_PORT · DB_NAME · DB_USER · DB_PASSWORD · PORT</text>
</svg>
